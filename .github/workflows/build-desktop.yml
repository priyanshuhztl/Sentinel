name: 'build desktop app'

# Manual trigger only — this is a personal-use build, not a CI check that
# should run on every push. Trigger it from the Actions tab when you want
# fresh Mac + Windows installers.
on:
  workflow_dispatch:

jobs:
  build-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: ['macos-latest', 'windows-latest']

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v7

      - name: setup node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: 'npm'

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: install frontend dependencies
        run: npm ci

      - uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: sentinel-v__VERSION__
          releaseName: 'Sentinel v__VERSION__'
          releaseBody: 'Desktop build. See assets below for the Mac and Windows installers.'
          releaseDraft: true
          prerelease: false
